name: 1. Usina Shorts (EN)

on:
  schedule:
    - cron: '30 0 * * *' # 20:30 ET (prev day) — roda antes do Usina Longos
  workflow_dispatch:

jobs:
  produzir_shorts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3'
      - run: pip install google-genai gspread
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_EN: ${{ secrets.GOOGLE_CREDENTIALS_EN }}
        run: python usina_shorts.py


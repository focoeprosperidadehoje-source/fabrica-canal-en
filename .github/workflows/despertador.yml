name: Daily Script Generator (EN)

on:
  schedule:
    - cron: '0 5,6,7 * * *' # 01:00, 02:00, 03:00 ET (EDT)
  workflow_dispatch:

jobs:
  produzir_videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: pip install --upgrade google-genai gspread
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_EN: ${{ secrets.GOOGLE_CREDENTIALS_EN }}
        run: python usina.py
